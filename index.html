<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acordify</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e1e1e">
    <link rel="icon" href="./icon-512.png" type="image/png">
</head>
<body>

    <header>
        <div class="brand" onclick="window.goHome()">🎸Acordify</div>
        
        <div class="search-container">
            <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <input type="text" id="searchInput" class="search-input" placeholder="Buscar canción o artista..." onkeyup="window.filterSongs()">
        </div>

        <div class="nav-links">
            <a href="lista.html" id="linkList">Lista</a> 
            <a href="#" id="actionBtn" class="mode-share">Compartir</a>
        </div>
    </header>

    <div class="container">
        
        <div id="songListView">
            <div class="filters">
                <button class="filter-btn" onclick="window.filterByType('Alabanza')">Alabanza</button>
                <button class="filter-btn" onclick="window.filterByType('Adoración')">Adoración</button>
                <button class="filter-btn" onclick="window.sortSongs('artist')">Artista</button>
                <button class="filter-btn" onclick="window.openKeyModal()">Nota</button>
                <button class="filter-btn" style="background:#e55039;" onclick="window.resetFilters()">Reset</button>
            </div>

            <table>
                <thead>
                    <tr>
                        <th width="10%">#</th>
                        <th width="40%">Título</th>
                        <th width="10%">Nota</th>
                        <th width="40%">Artista</th>
                        <th width="10%">+</th> 
                    </tr>
                </thead>
                <tbody id="tableBody">
                </tbody>
            </table>
        </div>

        <div id="songDetailView">
            
            <div id="songHeaderSticky" class="song-header-sticky">
                
                <div class="header-top-row">
                    <button class="btn-back-clean" onclick="window.goHome()">&lt;</button>
                    
                    <div class="header-title-group">
                        <h2 id="detailTitle"></h2>
                    </div>
                    
                    <button id="btnHamburger" class="hamburger-btn" onclick="window.toggleHamburgerDropdown(event)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="3" y1="12" x2="21" y2="12"></line>
                            <line x1="3" y1="6" x2="21" y2="6"></line>
                            <line x1="3" y1="18" x2="21" y2="18"></line>
                        </svg>
                    </button>
                </div>

                <div id="functionalControls" class="controls-bar">
                    <button class="clean-icon-btn" onclick="window.toggleModal('toneModal')" title="Cambiar Tono">
                        <span class="song-key-display" style="font-size: 1.2rem; font-weight: bold; color: #ff5252;"></span>
                    </button>

                    <button class="clean-icon-btn" onclick="window.toggleNotation()" title="Inglés/Español">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M5 8l6 6M4 14l6-6 2-3M2 5h12M7 2h1M22 22l-5-10-5 10M14 18h6"></path>
                        </svg>
                    </button>

                    <button class="clean-icon-btn" onclick="window.toggleChords()" title="Ocultar/Ver Acordes">
                        <svg class="chord-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </button>

                    <button class="clean-icon-btn" onclick="window.toggleModal('formatModal')" title="Tamaño Texto">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7V4h16v3M9 20h6M12 4v16"></path></svg>
                    </button>
                    
                    <button id="btnNotaMain" class="clean-icon-btn" onclick="window.openCommentModal()" title="Ver Notas">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                    </button>
                </div>

                <div id="sectionsNav" class="sections-bar">
                    <button id="nav-intro" class="section-btn intro-btn" onclick="window.scrollToSection('intro')">IN</button>
                    <button id="nav-v1" class="section-btn v1-btn" onclick="window.scrollToSection('v1')">V1</button>
                    <button id="nav-v2" class="section-btn v2-btn" onclick="window.scrollToSection('v2')">V2</button>
                    <button id="nav-v3" class="section-btn v3-btn" onclick="window.scrollToSection('v3')">V3</button>
                    <button id="nav-p" class="section-btn p-btn" onclick="window.scrollToSection('p')">P</button>
                    <button id="nav-c" class="section-btn c-btn" onclick="window.scrollToSection('c')">C</button>
                    <button id="nav-c2" class="section-btn c2-btn" onclick="window.scrollToSection('c2')">C2</button>
                    <button id="nav-v4" class="section-btn v4-btn" onclick="window.scrollToSection('v4')">V4</button>
                    <button id="nav-v5" class="section-btn v5-btn" onclick="window.scrollToSection('v5')">V5</button>
                    <button id="nav-v6" class="section-btn v6-btn" onclick="window.scrollToSection('v6')">V6</button>
                    <button id="nav-final" class="section-btn final-btn" onclick="window.scrollToSection('final')">F</button>
                </div>

                <div id="hamburgerDropdownMenu" class="hamburger-dropdown" onclick="event.stopPropagation()">
                    <div style="display: flex; gap: 15px; justify-content: center;">
                        <button class="clean-icon-btn" onclick="window.toggleModal('toneModal')" title="Cambiar Tono">
                            <span class="song-key-display" style="font-size: 1.2rem; font-weight: bold; color: #ff5252;"></span>
                        </button>
                        <button class="clean-icon-btn" onclick="window.toggleNotation()" title="Inglés/Español">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 8l6 6M4 14l6-6 2-3M2 5h12M7 2h1M22 22l-5-10-5 10M14 18h6"></path></svg>
                        </button>
                        <button class="clean-icon-btn" onclick="window.toggleChords()" title="Ocultar/Ver Acordes">
                            <svg class="chord-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                        </button>
                        <button class="clean-icon-btn" onclick="window.toggleModal('formatModal')" title="Tamaño Texto">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7V4h16v3M9 20h6M12 4v16"></path></svg>
                        </button>
                        <button id="hamburgerCommentBtn" class="clean-icon-btn" onclick="window.openCommentModal(); window.closeHamburgerDropdown();" title="Ver Notas">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                        </button>
                    </div>
                </div>

            </div> <div id="songContent" class="song-content"></div>
        </div>

    </div>

    <div id="keyModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="window.closeKeyModal()">&times;</span>
            <h2 style="color: var(--text-primary);">Selecciona una Nota</h2>
            <div class="key-grid" id="keyGrid"></div>
        </div>
    </div>

    <div id="commentModal" class="modal">
        <div class="modal-content" style="max-width: 400px; text-align: left;">
            <h3 style="color: var(--text-primary); margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 10px;">Notas</h3>
            <p id="fullCommentText" style="color: var(--text-white); font-size: 1.1rem; line-height: 1.5;"></p>
            <button class="btn-text" style="margin-top: 15px; background: #333;" onclick="window.closeCommentModal()">Cerrar</button>
        </div>
    </div>

    <div id="toneModal" class="mini-modal">
        <button class="modal-btn" onclick="window.applyTranspose(-2)">-1</button>
        <button class="modal-btn" onclick="window.applyTranspose(-1)">-½</button>
        <button class="modal-btn modal-btn-orig" onclick="window.resetTranspose()">Orig</button>
        <button class="modal-btn" onclick="window.applyTranspose(1)">+½</button>
        <button class="modal-btn" onclick="window.applyTranspose(2)">+1</button>
    </div>

    <div id="formatModal" class="mini-modal">
        <button class="modal-btn" onclick="window.changeFontSize(-2)">A-</button>
        <button class="modal-btn modal-btn-orig" onclick="window.resetFontSize()">Orig</button>
        <button class="modal-btn" onclick="window.changeFontSize(2)">A+</button>
    </div>

    <div id="modalOverlay" class="overlay-click-close" onclick="window.closeAllModals()"></div>

    <footer class="custom-footer">
        <div class="footer-copyright">Copyright © 2026 | Acordify</div>
        <div class="footer-credit">Servicio hecho por: <span>CirceHathaway</span></div>
    </footer>

    <div id="toastNotification" class="custom-notification"></div>

    <script src="canciones.js"></script>
    <script type="module" src="funcionalidad.js"></script>

</body>
</html>
